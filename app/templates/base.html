<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TG Media Bot{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1a1c2c, #0d0e14);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            opacity: 0.9;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .text-gradient {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-12 glass p-4 rounded-2xl">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                <i class="fas fa-bolt"></i>
            </div>
            <span class="text-2xl font-bold tracking-tight">Fast<span class="text-indigo-500">Stream</span></span>
        </div>
        <div class="hidden md:flex space-x-8">
            <a href="/" class="hover:text-indigo-400 transition">Home</a>
            <a href="#" class="hover:text-indigo-400 transition">Features</a>
            <a href="#" class="hover:text-indigo-400 transition">Support</a>
        </div>
        <a href="https://t.me/your_bot" target="_blank" class="btn-gradient px-6 py-2 rounded-xl font-semibold">
            Try Bot
        </a>
    </nav>

    <main class="max-w-6xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-20 py-8 border-t border-white/5 text-center text-gray-500">
        <p>&copy; 2024 FastStream Bot. All rights reserved.</p>
    </footer>
</body>
</html>
